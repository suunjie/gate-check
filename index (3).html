<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>현장 출입 안면인식</title>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh@0.4.1633559619/face_mesh.js" crossorigin="anonymous"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&family=JetBrains+Mono:wght@500;700&display=swap');
  :root{--bg:#0b0e14;--sf:#141922;--sf2:#1a2130;--bd:#1e2736;--tx:#e8ecf4;--dm:#6b7a94;--gn:#22c55e;--rd:#ef4444;--yl:#eab308;--bl:#3b82f6}
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%;overflow:hidden}
  body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--tx);-webkit-tap-highlight-color:transparent}

  .screen{display:none;flex-direction:column;height:100%}.screen.active{display:flex}

  /* Header */
  .hdr{padding:14px 16px;background:var(--sf);border-bottom:1px solid var(--bd);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;z-index:10}
  .hdr h1{font-size:15px;font-weight:700}.hdr .a{color:var(--bl)}
  .hdr-r{display:flex;align-items:center;gap:10px}
  .site-badge{font-size:10px;padding:3px 8px;border-radius:10px;background:rgba(59,130,246,.15);color:var(--bl);font-weight:500}
  .clock{font-size:11px;font-family:'JetBrains Mono',monospace;color:var(--dm)}

  /* ── Registration ── */
  .reg{flex:1;display:flex;flex-direction:column;justify-content:center;padding:32px 24px}
  .reg-top{text-align:center;margin-bottom:32px}
  .reg-top .icon{font-size:56px;margin-bottom:12px}
  .reg-top h2{font-size:22px;font-weight:900;margin-bottom:4px}
  .reg-top p{font-size:13px;color:var(--dm);line-height:1.6}
  .field{margin-bottom:16px}
  .field label{font-size:12px;color:var(--dm);font-weight:500;display:block;margin-bottom:6px}
  .field input{width:100%;padding:14px 16px;background:var(--sf2);border:1.5px solid var(--bd);border-radius:10px;font-family:'Noto Sans KR',sans-serif;font-size:15px;color:var(--tx);outline:none;transition:border-color .2s}
  .field input:focus{border-color:var(--bl)}
  .field input::placeholder{color:rgba(107,122,148,.5)}
  .btn{width:100%;padding:16px;border:none;border-radius:12px;font-family:'Noto Sans KR',sans-serif;font-size:16px;font-weight:700;cursor:pointer;transition:all .15s}
  .btn:active{transform:scale(.98)}
  .btn-blue{background:var(--bl);color:#fff}.btn-blue:disabled{opacity:.35}
  .btn-dark{background:var(--sf2);color:var(--tx);border:1px solid var(--bd)}
  .btn-green{background:var(--gn);color:#fff}

  /* ── Camera ── */
  .cam-area{flex:1;position:relative;overflow:hidden;background:#000}
  .cam-area video{width:100%;height:100%;object-fit:cover;transform:scaleX(-1)}
  .cam-area canvas{position:absolute;top:0;left:0;width:100%;height:100%;transform:scaleX(-1)}

  /* Face oval guide */
  .oval{position:absolute;top:50%;left:50%;width:270px;height:350px;transform:translate(-50%,-52%);border:3px dashed rgba(255,255,255,.2);border-radius:50%;pointer-events:none;z-index:5;transition:all .3s}
  .oval.detecting{border-style:solid;border-color:var(--yl)}
  .oval.good{border-color:var(--gn);border-style:solid;box-shadow:0 0 40px rgba(34,197,94,.15)}
  .oval.captured{border-color:var(--gn);box-shadow:0 0 60px rgba(34,197,94,.25)}

  /* Progress ring inside oval */
  .ring-wrap{position:absolute;top:50%;left:50%;transform:translate(-50%,-52%);z-index:6;pointer-events:none;opacity:0;transition:opacity .3s}
  .ring-wrap.show{opacity:1}
  .ring-wrap svg{filter:drop-shadow(0 0 8px rgba(34,197,94,.3))}

  .guide-msg{position:absolute;top:50%;left:50%;transform:translate(-50%,200px);font-size:14px;text-align:center;z-index:7;pointer-events:none;width:280px;line-height:1.5;font-weight:500}

  /* Angle HUD */
  .angle-box{position:absolute;top:12px;left:12px;background:rgba(0,0,0,.55);backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);border-radius:8px;padding:8px 12px;z-index:8;font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--dm);line-height:1.7}
  .angle-box .g{color:var(--gn)}.angle-box .y{color:var(--yl)}

  /* Worker info badge */
  .wk-badge{position:absolute;bottom:12px;left:12px;right:12px;background:rgba(0,0,0,.55);backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);border-radius:10px;padding:10px 14px;z-index:8;display:flex;align-items:center;gap:10px}
  .wk-badge .name{font-size:14px;font-weight:700}.wk-badge .meta{font-size:11px;color:var(--dm);font-family:'JetBrains Mono',monospace}

  /* Flash */
  .flash{position:absolute;top:0;left:0;right:0;bottom:0;background:#fff;z-index:30;opacity:0;pointer-events:none}
  @keyframes flashAnim{0%{opacity:.9}100%{opacity:0}}
  .flash.fire{animation:flashAnim .5s ease-out}

  /* ── Result overlay ── */
  .result-ov{position:absolute;top:0;left:0;right:0;bottom:0;display:none;flex-direction:column;align-items:center;z-index:50;background:rgba(11,14,20,.92);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);overflow-y:auto;padding:32px 0 40px;-webkit-overflow-scrolling:touch}
  .result-ov.active{display:flex}

  .r-photo{width:140px;height:175px;border-radius:12px;overflow:hidden;border:4px solid var(--gn);margin-bottom:16px;box-shadow:0 8px 32px rgba(34,197,94,.2)}
  .r-photo img{width:100%;height:100%;object-fit:cover;-webkit-touch-callout:default}
  .r-save-hint{font-size:11px;color:var(--dm);margin-top:-8px;margin-bottom:12px;text-align:center}
  .r-name{font-size:20px;font-weight:900;margin-bottom:2px}
  .r-meta{font-size:12px;color:var(--dm);font-family:'JetBrains Mono',monospace;margin-bottom:20px}
  .r-check{font-size:72px;margin-bottom:4px}
  .r-title{font-size:36px;font-weight:900;color:var(--gn);margin-bottom:4px;letter-spacing:-1px}
  .r-time{font-size:13px;color:var(--dm);font-family:'JetBrains Mono',monospace;margin-bottom:24px}

  .r-card{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08);border-radius:12px;padding:16px 20px;width:calc(100% - 48px);max-width:320px;margin-bottom:24px}
  .r-row{display:flex;justify-content:space-between;padding:5px 0;font-size:13px}
  .r-row .rl{color:var(--dm)}.r-row .rv{font-family:'JetBrains Mono',monospace;font-weight:600}

  .r-btns{display:flex;gap:12px}
  .r-btns button{padding:14px 24px;border-radius:10px;border:none;font-family:'Noto Sans KR',sans-serif;font-size:14px;font-weight:600;cursor:pointer}

  /* History */
  .hist-title{font-size:13px;color:var(--dm);margin-bottom:10px;display:flex;justify-content:space-between;align-items:center}
  .hist-grid{display:flex;gap:8px;overflow-x:auto;padding-bottom:8px;-webkit-overflow-scrolling:touch}
  .hist-item{flex-shrink:0;width:64px;text-align:center}
  .hist-item img{width:56px;height:70px;border-radius:6px;object-fit:cover;border:1.5px solid var(--bd)}
  .hist-item .hi-name{font-size:9px;color:var(--dm);margin-top:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .hist-item .hi-time{font-size:8px;color:rgba(107,122,148,.5);font-family:'JetBrains Mono',monospace}

  /* History count */
  .history-badge{position:absolute;top:12px;right:12px;background:rgba(0,0,0,.55);backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);border-radius:8px;padding:6px 10px;z-index:8;font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--dm)}
</style>
</head>
<body>

<!-- ═══ Screen 0: 작업자 등록 ═══ -->
<div class="screen active" id="scr-reg">
  <div class="hdr">
    <h1>🏗️ 현장 <span class="a">안면인식</span></h1>
    <div class="hdr-r"><span class="site-badge">건설현장 A</span></div>
  </div>
  <div class="reg">
    <div class="reg-top">
      <div class="icon">👷</div>
      <h2>작업자 정보 입력</h2>
      <p>출입 전 작업자 정보를 먼저 입력하세요.<br>이후 카메라로 안면 촬영이 진행됩니다.</p>
    </div>
    <div class="field"><label>이름</label><input type="text" id="inp-name" placeholder="홍길동" autocomplete="off"></div>
    <div class="field"><label>사번</label><input type="text" id="inp-id" placeholder="A-2024-0312" autocomplete="off"></div>
    <div class="field"><label>작업 구역 (선택)</label><input type="text" id="inp-zone" placeholder="3공구 타워크레인" autocomplete="off"></div>
    <button class="btn btn-blue" id="btn-next" onclick="goCamera()" disabled>안면 촬영 →</button>
  </div>
</div>

<!-- ═══ Screen 1: 카메라 ═══ -->
<div class="screen" id="scr-cam">
  <div class="hdr">
    <h1>📸 안면 촬영</h1>
    <div class="hdr-r"><span class="clock" id="clock"></span></div>
  </div>
  <div class="cam-area">
    <video id="cam" autoplay playsinline muted></video>
    <canvas id="ov-cv"></canvas>
    <div class="flash" id="flash"></div>

    <div class="oval" id="oval"></div>
    <div class="ring-wrap" id="ring-wrap">
      <svg width="290" height="370" viewBox="0 0 290 370">
        <ellipse cx="145" cy="185" rx="135" ry="175" fill="none" stroke="rgba(255,255,255,.06)" stroke-width="5"/>
        <ellipse cx="145" cy="185" rx="135" ry="175" fill="none" stroke="var(--gn)" stroke-width="5"
          stroke-dasharray="980" stroke-dashoffset="980" stroke-linecap="round" id="ring-el"/>
      </svg>
    </div>

    <div class="guide-msg" id="guide-msg" style="color:var(--dm)">얼굴을 원 안에 맞춰주세요</div>

    <div class="angle-box" id="angle-box">
      좌우: <span id="h-yaw" class="y">—</span>°<br>
      상하: <span id="h-pitch" class="y">—</span>°
    </div>

    <div class="history-badge" id="hist-badge">오늘 0명 촬영</div>

    <div class="wk-badge">
      <div><div class="name" id="wk-name"></div><div class="meta" id="wk-meta"></div></div>
    </div>

    <!-- Result overlay -->
    <div class="result-ov" id="result-ov">
      <div class="r-photo"><img id="r-img" src=""></div>
      <div class="r-save-hint">📱 사진을 길게 눌러 저장</div>
      <div class="r-name" id="r-name"></div>
      <div class="r-meta" id="r-meta"></div>
      <div class="r-check">✅</div>
      <div class="r-title">출입 확인</div>
      <div class="r-time" id="r-time"></div>
      <div class="r-card" id="r-card"></div>
      <div class="r-btns">
        <button class="btn-dark" onclick="sharePhoto()">📸 사진 저장</button>
        <button class="btn-dark" onclick="saveRecord()">💾 JSON</button>
        <button class="btn-green" onclick="nextWorker()">다음 →</button>
      </div>
      <div id="hist-area" style="width:calc(100% - 48px);max-width:320px;margin-top:20px"></div>
    </div>
  </div>
</div>

<script>
var faceMesh=null, landmarks=null, faceDetected=false;
var faceYaw=0, facePitch=0, angleOK=false;
var YAW_TH=12, PITCH_TH=10;
var photoTaken=false, photoData='';
var goodStart=0, HOLD=1500;
var wName='', wID='', wZone='';
var todayCount=0;
var currentRecord=null;

// ── Registration ──
document.getElementById('inp-name').addEventListener('input',chk);
document.getElementById('inp-id').addEventListener('input',chk);
function chk(){
  var n=document.getElementById('inp-name').value.trim();
  var i=document.getElementById('inp-id').value.trim();
  document.getElementById('btn-next').disabled=!(n&&i);
}

function goCamera(){
  wName=document.getElementById('inp-name').value.trim();
  wID=document.getElementById('inp-id').value.trim();
  wZone=document.getElementById('inp-zone').value.trim()||'미지정';
  document.getElementById('wk-name').textContent=wName;
  document.getElementById('wk-meta').textContent=wID+' · '+wZone;
  document.getElementById('scr-reg').classList.remove('active');
  document.getElementById('scr-cam').classList.add('active');
  document.getElementById('hist-badge').textContent='오늘 '+todayCount+'명 촬영';
  initCam();
}

// ── Camera ──
function initCam(){
  faceMesh=new FaceMesh({locateFile:function(f){return 'https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh@0.4.1633559619/'+f;}});
  faceMesh.setOptions({maxNumFaces:1,refineLandmarks:true,minDetectionConfidence:.5,minTrackingConfidence:.5});
  faceMesh.onResults(onRes);

  navigator.mediaDevices.getUserMedia({video:{facingMode:'user',width:{ideal:640},height:{ideal:480}}})
  .then(function(s){
    var v=document.getElementById('cam');
    v.srcObject=s;
    v.onloadedmetadata=function(){
      v.play();
      var c=document.getElementById('ov-cv');
      c.width=v.videoWidth;c.height=v.videoHeight;
      loop();
    };
  })
  .catch(function(e){
    document.getElementById('guide-msg').textContent='카메라 권한을 허용해주세요';
    alert('카메라 오류: '+e.message);
  });
}

function loop(){
  var v=document.getElementById('cam');
  if(v.readyState>=2) faceMesh.send({image:v}).then(function(){requestAnimationFrame(loop);});
  else requestAnimationFrame(loop);
}

// ── Face angle ──
function calcAngle(lm){
  var nose=lm[1],lc=lm[234],rc=lm[454];
  var midX=(lc.x+rc.x)/2, fW=Math.abs(rc.x-lc.x);
  faceYaw=((nose.x-midX)/(fW+.001))*90;

  var fh=lm[10],chin=lm[152];
  var fH=Math.abs(chin.y-fh.y), midY=(fh.y+chin.y)/2;
  facePitch=((nose.y-midY)/(fH+.001)-.05)*90;

  angleOK=Math.abs(faceYaw)<YAW_TH&&Math.abs(facePitch)<PITCH_TH;
}

// ── Main callback ──
function onRes(r){
  var oval=document.getElementById('oval');

  if(!r.multiFaceLandmarks||!r.multiFaceLandmarks.length){
    faceDetected=false;
    oval.className='oval';
    if(!photoTaken) document.getElementById('guide-msg').textContent='얼굴을 원 안에 맞춰주세요';
    document.getElementById('guide-msg').style.color='var(--dm)';
    goodStart=0;
    document.getElementById('ring-wrap').classList.remove('show');
    document.getElementById('ring-el').style.strokeDashoffset='980';
    return;
  }

  faceDetected=true;
  landmarks=r.multiFaceLandmarks[0];
  calcAngle(landmarks);

  // HUD
  var hy=document.getElementById('h-yaw'),hp=document.getElementById('h-pitch');
  hy.textContent=faceYaw.toFixed(0);
  hy.className=Math.abs(faceYaw)<YAW_TH?'g':'y';
  hp.textContent=facePitch.toFixed(0);
  hp.className=Math.abs(facePitch)<PITCH_TH?'g':'y';

  if(photoTaken) return; // already captured

  if(angleOK){
    oval.className='oval good';
    if(goodStart===0) goodStart=performance.now();
    var held=performance.now()-goodStart;
    var pct=Math.min(1,held/HOLD);

    // Show progress ring
    document.getElementById('ring-wrap').classList.add('show');
    document.getElementById('ring-el').style.strokeDashoffset=(980*(1-pct)).toFixed(0);

    document.getElementById('guide-msg').textContent='그대로 유지하세요...';
    document.getElementById('guide-msg').style.color='var(--gn)';

    if(held>=HOLD) capture();
  } else {
    oval.className='oval detecting';
    goodStart=0;
    document.getElementById('ring-wrap').classList.remove('show');
    document.getElementById('ring-el').style.strokeDashoffset='980';

    var hint='정면을 바라봐주세요';
    if(faceYaw<-YAW_TH) hint='← 오른쪽으로 살짝 돌려주세요';
    else if(faceYaw>YAW_TH) hint='→ 왼쪽으로 살짝 돌려주세요';
    else if(facePitch<-PITCH_TH) hint='↑ 고개를 조금 들어주세요';
    else if(facePitch>PITCH_TH) hint='↓ 고개를 조금 내려주세요';
    document.getElementById('guide-msg').textContent=hint;
    document.getElementById('guide-msg').style.color='var(--yl)';
  }

  // Draw landmarks
  var c=document.getElementById('ov-cv'),cx=c.getContext('2d');
  cx.clearRect(0,0,c.width,c.height);
  if(landmarks.length>=478){
    [468,473].forEach(function(i){
      var p=landmarks[i];
      cx.beginPath();cx.arc(p.x*c.width,p.y*c.height,3,0,Math.PI*2);
      cx.fillStyle='rgba(34,197,94,.6)';cx.fill();
    });
  }
}

// ── Capture ──
function capture(){
  photoTaken=true;
  var v=document.getElementById('cam');
  var c=document.createElement('canvas');
  c.width=v.videoWidth;c.height=v.videoHeight;
  var cx=c.getContext('2d');
  cx.translate(c.width,0);cx.scale(-1,1);
  cx.drawImage(v,0,0);
  photoData=c.toDataURL('image/jpeg',.85);

  // Flash
  var fl=document.getElementById('flash');
  fl.classList.remove('fire');void fl.offsetWidth;fl.classList.add('fire');
  if(navigator.vibrate) navigator.vibrate([100,50,100]);

  document.getElementById('oval').className='oval captured';
  document.getElementById('ring-wrap').classList.remove('show');
  document.getElementById('guide-msg').textContent='촬영 완료!';
  document.getElementById('guide-msg').style.color='var(--gn)';

  // Build record
  var now=new Date();
  currentRecord={
    name:wName, id:wID, zone:wZone,
    timestamp:now.toISOString(),
    photo:photoData,
    faceAngle:{yaw:faceYaw.toFixed(1),pitch:facePitch.toFixed(1)}
  };

  todayCount++;
  document.getElementById('hist-badge').textContent='오늘 '+todayCount+'명 촬영';

  // ── Auto-save to localStorage ──
  try{
    var records=JSON.parse(localStorage.getItem('gate_records')||'[]');
    // Store thumbnail (smaller) to save space
    var thumb=document.createElement('canvas');
    thumb.width=160;thumb.height=200;
    var tx=thumb.getContext('2d');
    var img=new Image();
    img.onload=function(){
      tx.drawImage(img,0,0,160,200);
      var thumbData=thumb.toDataURL('image/jpeg',.6);
      records.push({
        name:wName, id:wID, zone:wZone,
        time:now.toLocaleString('ko-KR'),
        timestamp:now.toISOString(),
        angle:{yaw:faceYaw.toFixed(0),pitch:facePitch.toFixed(0)},
        thumb:thumbData
      });
      // Keep last 50 records max
      if(records.length>50) records=records.slice(-50);
      localStorage.setItem('gate_records',JSON.stringify(records));
    };
    img.src=photoData;
  }catch(e){}

  // ── Auto-download photo ──
  // Use Share API on mobile, fallback to download
  // Photo will also be saveable via long-press in result screen

  // Show result after short delay
  setTimeout(function(){
    document.getElementById('r-img').src=photoData;
    document.getElementById('r-name').textContent=wName;
    document.getElementById('r-meta').textContent=wID+' · '+wZone;
    document.getElementById('r-time').textContent=
      now.getFullYear()+'.'+(now.getMonth()+1)+'.'+now.getDate()+' '+
      now.toLocaleTimeString('ko-KR');

    document.getElementById('r-card').innerHTML=
      rr('이름',wName)+rr('사번',wID)+rr('작업 구역',wZone)+
      rr('촬영 시각',now.toLocaleTimeString('ko-KR'))+
      rr('얼굴 각도','Yaw '+faceYaw.toFixed(0)+'° / Pitch '+facePitch.toFixed(0)+'°');

    // Load history
    renderHistory();

    document.getElementById('result-ov').classList.add('active');
  },600);
}

function rr(l,v){return '<div class="r-row"><span class="rl">'+l+'</span><span class="rv">'+v+'</span></div>';}

function renderHistory(){
  var area=document.getElementById('hist-area');
  try{
    var records=JSON.parse(localStorage.getItem('gate_records')||'[]');
    if(records.length===0){area.innerHTML='';return;}

    // Show last 20 in reverse
    var recent=records.slice(-20).reverse();
    var html='<div class="hist-title"><span>📋 최근 촬영 기록 ('+records.length+'명)</span><span style="font-size:10px;cursor:pointer;color:var(--rd)" onclick="clearHistory()">전체 삭제</span></div>';
    html+='<div class="hist-grid">';
    recent.forEach(function(r){
      html+='<div class="hist-item">';
      html+='<img src="'+(r.thumb||'')+'" alt="">';
      html+='<div class="hi-name">'+r.name+'</div>';
      html+='<div class="hi-time">'+r.id+'</div>';
      html+='</div>';
    });
    html+='</div>';
    area.innerHTML=html;
  }catch(e){area.innerHTML='';}
}

function clearHistory(){
  if(confirm('전체 촬영 기록을 삭제하시겠습니까?')){
    localStorage.removeItem('gate_records');
    todayCount=0;
    document.getElementById('hist-badge').textContent='오늘 0명 촬영';
    renderHistory();
  }
}

// Load today count from localStorage on init
try{
  var recs=JSON.parse(localStorage.getItem('gate_records')||'[]');
  var today=new Date().toISOString().slice(0,10);
  todayCount=recs.filter(function(r){return r.timestamp&&r.timestamp.slice(0,10)===today}).length;
}catch(e){todayCount=0;}
// Will update badge when camera screen opens

// ── Save ──
function sharePhoto(){
  if(!photoData) return;
  if(navigator.share&&navigator.canShare){
    fetch(photoData).then(function(r){return r.blob()}).then(function(blob){
      var file=new File([blob],'face_'+wID+'.jpg',{type:'image/jpeg'});
      if(navigator.canShare({files:[file]})){
        navigator.share({
          title:wName+' 출입 사진',
          text:wID+' · '+new Date().toLocaleString('ko-KR'),
          files:[file]
        }).catch(function(){fallbackSave();});
      } else { fallbackSave(); }
    }).catch(function(){fallbackSave();});
  } else {
    fallbackSave();
  }
}
function fallbackSave(){
  var win=window.open();
  if(win){
    win.document.write('<html><head><title>사진 저장</title><meta name="viewport" content="width=device-width"><style>body{margin:0;background:#000;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;font-family:sans-serif}img{max-width:90%;border-radius:8px}p{color:#999;margin-top:16px;font-size:14px}</style></head><body><img src="'+photoData+'"><p>📱 사진을 길게 눌러 저장하세요</p></body></html>');
    win.document.close();
  } else {
    var a=document.createElement('a');a.href=photoData;a.download='face_'+wID+'.jpg';a.click();
  }
}

function saveRecord(){
  if(!currentRecord) return;
  // JSON
  var blob=new Blob([JSON.stringify(currentRecord,null,2)],{type:'application/json'});
  var a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download='checkin_'+wID+'_'+new Date().toISOString().slice(0,16).replace(/:/g,'')+'.json';
  a.click();
  // Photo
  if(photoData){
    var a2=document.createElement('a');
    a2.href=photoData;
    a2.download='face_'+wID+'_'+new Date().toISOString().slice(0,16).replace(/:/g,'')+'.jpg';
    setTimeout(function(){a2.click();},400);
  }
}

// ── Next worker ──
function nextWorker(){
  document.getElementById('result-ov').classList.remove('active');
  photoTaken=false;photoData='';goodStart=0;currentRecord=null;
  document.getElementById('oval').className='oval';
  document.getElementById('guide-msg').textContent='얼굴을 원 안에 맞춰주세요';
  document.getElementById('guide-msg').style.color='var(--dm)';
  document.getElementById('angle-box').style.display='';

  // Go back to registration for next worker
  document.getElementById('scr-cam').classList.remove('active');
  document.getElementById('scr-reg').classList.add('active');
  document.getElementById('inp-name').value='';
  document.getElementById('inp-id').value='';
  document.getElementById('inp-zone').value='';
  document.getElementById('btn-next').disabled=true;
  document.getElementById('inp-name').focus();
}

setInterval(function(){var e=document.getElementById('clock');if(e)e.textContent=new Date().toLocaleTimeString('ko-KR');},1000);
</script>
